<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Carta - {{ card.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a332a 0%, #0b0c10 60%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        h1, h2, h3, h4 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
            margin-top: 0;
        }

        .header {
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 255, 128, 0.1);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-box {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            padding: 40px;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(0, 255, 128, 0.05);
            width: 100%;
            position: relative;
        }

        .form-box::before {
            content: '';
            position: absolute;
            top: -1px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        input, select {
            background-color: #111;
            color: #fff;
            border: 1px solid #555;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:disabled {
            background-color: #050505;
            color: #777;
            border-color: #222;
        }

        input:focus:not(:disabled), select:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        input[type="file"] {
            padding: 9px;
            background: #1a1a1a;
            color: #aaa;
            cursor: pointer;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #aa8010);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        button:hover {
            background: linear-gradient(to bottom, #fceb9c, #d4af37);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: #888;
            box-shadow: none;
            transform: translateY(0);
        }

        .glow-decoration {
            position: fixed;
            top: 30%;
            left: -10%;
            width: 40vw;
            height: 60vh;
            background: radial-gradient(ellipse at center, rgba(0, 255, 128, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glow-decoration.right {
            left: auto;
            right: -10%;
        }
    </style>
</head>
<body>
    <div class="glow-decoration"></div>
    <div class="glow-decoration right"></div>

    <div class="header">
        <h1>Editar<br><span style="font-size: 0.4em; color: #fff; letter-spacing: 5px;">Modificar Carta: {{ card.name }}</span></h1>
    </div>

    <div class="container">
        <div class="form-box">
            <form action="/cards_edit_form/{{ card.id }}" method="POST" enctype="multipart/form-data">

                <div class="form-row">
                    <div class="form-group" style="flex: 0.3;">
                        <label for="id">ID de la carta</label>
                        <input type="number" id="id" value="{{ card.id }}" disabled>
                    </div>
                    <div class="form-group" style="flex: 0.7;">
                        <label for="name">Nombre de la carta</label>
                        <input type="text" id="name" name="name" value="{{ card.name }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="faction">Facción</label>
                        <select id="faction" name="faction" required>
                            <option value="Northern Realms" {% if card.faction == 'Northern Realms' %}selected{% endif %}>Northern Realms</option>
                            <option value="Monsters" {% if card.faction == 'Monsters' %}selected{% endif %}>Monsters</option>
                            <option value="Nilfgaardian Empire" {% if card.faction == 'Nilfgaardian Empire' %}selected{% endif %}>Nilfgaardian Empire</option>
                            <option value="Scoia'tael" {% if card.faction == "Scoia'tael" %}selected{% endif %}>Scoia'tael</option>
                            <option value="Neutral" {% if card.faction == 'Neutral' %}selected{% endif %}>Neutral</option>
                            <option value="Skellige" {% if card.faction == 'Skellige' %}selected{% endif %}>Skellige</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Tipo</label>
                        <select id="type" name="type" required>
                            <option value="Unit" {% if card.type == 'Unit' %}selected{% endif %}>Unit</option>
                            <option value="Hero" {% if card.type == 'Hero' %}selected{% endif %}>Hero</option>
                            <option value="Leader" {% if card.type == 'Leader' %}selected{% endif %}>Leader</option>
                            <option value="Weather" {% if card.type == 'Weather' %}selected{% endif %}>Weather</option>
                            <option value="Special" {% if card.type == 'Special' %}selected{% endif %}>Special</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="row">Línea (Fila)</label>
                        <select id="row" name="row" required>
                            <option value="Melee" {% if card.row == 'Melee' %}selected{% endif %}>Melee</option>
                            <option value="Range" {% if card.row == 'Range' %}selected{% endif %}>Range</option>
                            <option value="Siege" {% if card.row == 'Siege' %}selected{% endif %}>Siege</option>
                            <option value="Agile(Melee+Range)" {% if card.row == 'Agile(Melee+Range)' %}selected{% endif %}>Agile (Melee+Range)</option>
                            <option value="None" {% if card.row == 'None' %}selected{% endif %}>Ninguna (Leader/Weather/Special)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="power">Poder</label>
                        <input type="number" id="power" name="power" value="{{ card.power }}" min="0" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ability">Habilidad Especial</label>
                        <select id="ability" name="ability" required>
                            <option value="Ninguna" {% if card.ability == 'Ninguna' %}selected{% endif %}>Ninguna</option>
                            <option value="Berserker" {% if card.ability == 'Berserker' %}selected{% endif %}>Berserker</option>
                            <option value="Commander Horn" {% if card.ability == 'Commander Horn' %}selected{% endif %}>Commander Horn</option>
                            <option value="Decoy" {% if card.ability == 'Decoy' %}selected{% endif %}>Decoy</option>
                            <option value="Hero" {% if card.ability == 'Hero' %}selected{% endif %}>Hero / Inmune</option>
                            <option value="Medic" {% if card.ability == 'Medic' %}selected{% endif %}>Medic</option>
                            <option value="Morale Boost" {% if card.ability == 'Morale Boost' %}selected{% endif %}>Morale Boost</option>
                            <option value="Mardroeme" {% if card.ability == 'Mardroeme' %}selected{% endif %}>Mardroeme</option>
                            <option value="Muster" {% if card.ability == 'Muster' %}selected{% endif %}>Muster</option>
                            <option value="Scorch" {% if card.ability == 'Scorch' %}selected{% endif %}>Scorch</option>
                            <option value="Spy" {% if card.ability == 'Spy' %}selected{% endif %}>Spy</option>
                            <option value="Tight Bond" {% if card.ability == 'Tight Bond' %}selected{% endif %}>Tight Bond</option>
                            <option value="Weather" {% if card.ability == 'Weather' %}selected{% endif %}>Weather</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="image">Cambiar Ilutración <span style="font-size: 0.7em; color: #777;">(Dejar vacío para conservar la actual)</span></label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <div class="actions">
                    <a href="/cards_html/{{ card.id }}" style="text-decoration:none;">
                        <button type="button" class="btn-secondary">Cancelar</button>
                    </a>
                    <button type="submit">Actualizar Carta</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
