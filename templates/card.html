<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ card.name }} - Detalles de Carta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a332a 0%, #0b0c10 60%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, h4 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
            margin-top: 0;
        }

        .header {
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 255, 128, 0.1);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            gap: 40px;
        }

        .image-col {
            flex: 1;
            max-width: 400px;
        }

        .image-col img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            border: 2px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .image-placeholder {
            width: 100%;
            height: 500px;
            background: rgba(26, 26, 26, 0.8);
            border: 2px dashed #d4af37;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.2em;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
        }

        .details-col {
            flex: 1.5;
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            padding: 35px;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .details-col h2 {
            font-size: 2.5em;
            margin-bottom: 10px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(30, 30, 30, 0.6);
            padding: 15px;
            border-left: 3px solid #d4af37;
            border-radius: 0 4px 4px 0;
        }

        .info-label {
            color: #aaa;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
        }

        .ability-box {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.8) 0%, rgba(20, 20, 20, 0.9) 100%);
            border: 1px solid #444;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .ability-box p {
            margin: 0;
            line-height: 1.6;
            color: #ccc;
        }

        .ability-label {
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #aa8010);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            text-decoration: none;
            display: inline-block;
        }

        button:hover {
            background: linear-gradient(to bottom, #fceb9c, #d4af37);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(to bottom, #555, #333);
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: linear-gradient(to bottom, #777, #555);
            box-shadow: 0 0 10px #777;
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(to bottom, #a00, #600);
            color: #fff;
        }

        .btn-danger:hover {
            background: linear-gradient(to bottom, #f33, #a00);
            box-shadow: 0 0 10px #f33;
        }

        .glow-decoration {
            position: fixed;
            top: 30%;
            left: -10%;
            width: 40vw;
            height: 60vh;
            background: radial-gradient(ellipse at center, rgba(0, 255, 128, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .glow-decoration.right {
            left: auto;
            right: -10%;
        }
    </style>
</head>
<body>
    <div class="glow-decoration"></div>
    <div class="glow-decoration right"></div>

    <div class="header">
        <h1>INSPECCIONAR<br><span style="font-size: 0.4em; color: #fff; letter-spacing: 5px;">Carta Coleccionada</span></h1>
    </div>

    <div class="container">
        <!-- img -->
        <div class="image-col">
            {% if card.image_url %}
                <img src="{{ card.image_url }}" alt="Imagen de {{ card.name }}">
            {% else %}
                <div class="image-placeholder">SIN IMAGEN</div>
            {% endif %}
        </div>

        <!---detalles -->
        <div class="details-col">
            <h2>{{ card.name }}</h2>

            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Facción</div>
                    <div class="info-value">{{ card.faction }}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Tipo</div>
                    <div class="info-value">{{ card.type }}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Poder</div>
                    <div class="info-value" style="color: #d4af37;">{{ card.power }}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Fila</div>
                    <div class="info-value">{{ card.row }}</div>
                </div>
            </div>

            <div class="ability-box">
                <span class="ability-label">Habilidad</span>
                <p>{{ card.ability }}</p>
            </div>

            <div class="info-label">ID Sistema: {{ card.id }}</div>
            <hr>

            <div class="actions">
                <a href="/edit_card/{{ card.id }}" style="text-decoration:none;">
                    <button type="button">Editar Carta</button>
                </a>

                <form action="/cards_html/{{ card.id }}/delete" method="POST" style="margin:0;" onsubmit="return confirm('¿Estás seguro de que quieres eliminar esta carta permanentemente?');">
                    <button type="submit" class="btn-danger">Destruir Carta</button>
                </form>

                <a href="/" style="text-decoration:none; margin-left:auto;">
                    <button type="button" class="btn-secondary">Volver al Dashboard</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
