<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Carta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 0%, #1a332a 0%, #0b0c10 60%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        h1, h2, h3, h4 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
            margin-top: 0;
        }

        .header {
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 255, 128, 0.1);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-box {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid #333;
            padding: 40px;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(0, 255, 128, 0.05);
            width: 100%;
            position: relative;
        }

        .form-box::before {
            content: '';
            position: absolute;
            top: -1px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        input, select {
            background-color: #111;
            color: #fff;
            border: 1px solid #555;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        input[type="file"] {
            padding: 9px;
            background: #1a1a1a;
            color: #aaa;
            cursor: pointer;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        button {
            background: linear-gradient(to bottom, #d4af37, #aa8010);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 3px;
            text-transform: uppercase;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        button:hover {
            background: linear-gradient(to bottom, #fceb9c, #d4af37);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: #888;
            box-shadow: none;
            transform: translateY(0);
        }

        .glow-decoration {
            position: fixed;
            top: 30%;
            left: -10%;
            width: 40vw;
            height: 60vh;
            background: radial-gradient(ellipse at center, rgba(0, 255, 128, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glow-decoration.right {
            left: auto;
            right: -10%;
        }
    </style>
</head>
<body>
    <div class="glow-decoration"></div>
    <div class="glow-decoration right"></div>

    <div class="header">
        <h1>Registro<br><span style="font-size: 0.4em; color: #fff; letter-spacing: 5px;">Registrar Nueva Carta</span></h1>
    </div>

    <div class="container">
        <div class="form-box">
            <form action="/cards_form" method="POST" enctype="multipart/form-data">

                <div class="form-row">
                    <div class="form-group" style="flex: 0.3;">
                        <label for="id">ID Sistema</label>
                        <input type="number" id="id" name="id" required placeholder="Ej: 101">
                    </div>
                    <div class="form-group" style="flex: 0.7;">
                        <label for="name">Nombre de la carta</label>
                        <input type="text" id="name" name="name" required placeholder="Geralt de Rivia...">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="faction">Facción</label>
                        <select id="faction" name="faction" required>
                            <option value="Northern Realms">Northern Realms</option>
                            <option value="Monsters">Monsters</option>
                            <option value="Nilfgaardian Empire">Nilfgaardian Empire</option>
                            <option value="Scoia'tael">Scoia'tael</option>
                            <option value="Neutral">Neutral</option>
                            <option value="Skellige">Skellige</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Tipo</label>
                        <select id="type" name="type" required>
                            <option value="Unit">Unit</option>
                            <option value="Hero">Hero</option>
                            <option value="Leader">Leader</option>
                            <option value="Weather">Weather</option>
                            <option value="Special">Special</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="row">Línea (Fila)</label>
                        <select id="row" name="row" required>
                            <option value="Melee">Melee</option>
                            <option value="Range">Range</option>
                            <option value="Siege">Siege</option>
                            <option value="Agile(Melee+Range)">Agile (Melee+Range)</option>
                            <option value="None">Ninguna (Líder/Clima/Especial)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="power">Poder</label>
                        <input type="number" id="power" name="power" min="0" required placeholder="0 - 15...">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ability">Habilidad Especial</label>
                        <select id="ability" name="ability" required>
                            <option value="Ninguna">Ninguna</option>
                            <option value="Berserker">Berserker</option>
                            <option value="Commander Horn">Commander Horn</option>
                            <option value="Decoy">Decoy</option>
                            <option value="Hero">Hero / Inmune</option>
                            <option value="Medic">Medic</option>
                            <option value="Morale Boost">Morale Boost</option>
                            <option value="Mardroeme">Mardroeme</option>
                            <option value="Muster">Muster</option>
                            <option value="Scorch">Scorch</option>
                            <option value="Spy">Spy</option>
                            <option value="Tight Bond">Tight Bond</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="image">Ilustración (Imagen)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <div class="actions">
                    <a href="/" style="text-decoration:none;">
                        <button type="button" class="btn-secondary">Cancelar</button>
                    </a>
                    <button type="submit">Guardar Carta</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
