<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Carta</title>
</head>
<body>
    <h1>Registrar nueva carta de Gwent</h1>
    <hr>
    <!-- IMPORTANTE: Añadir enctype para permitir envío de imágenes -->
    <form action="/cards_form" method="POST" enctype="multipart/form-data">

        <label for="id">ID de la carta:</label><br>
        <input type="number" id="id" name="id" required><br><br>

        <label for="name">Nombre de la carta:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="power">Poder:</label><br>
        <input type="number" id="power" name="power" required><br><br>

        <label for="type">Tipo (Hero, Unit, Special, Leader):</label><br>
        <input type="text" id="type" name="type" required><br><br>

        <label for="row">Fila (Melee, Ranged, Siege, Any):</label><br>
        <input type="text" id="row" name="row" required><br><br>

        <label for="faction">Facción:</label><br>
        <input type="text" id="faction" name="faction" required><br><br>

        <label for="ability">Habilidad:</label><br>
        <input type="text" id="ability" name="ability" required><br><br>

        <!-- Nuevo campo para subir la imagen -->
        <label for="image">Imagen de la carta:</label><br>
        <input type="file" id="image" name="image" accept="image/*"><br><br>

        <button type="submit">Guardar Carta</button>
    </form>

    <br>
    <a href="/">Volver a la colección</a>
</body>
</html>
